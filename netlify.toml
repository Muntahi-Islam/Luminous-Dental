[build]
  command = "sed -i 's/provider = \"sqlite\"/provider = \"postgresql\"/' prisma/schema.prisma && npx prisma generate && npx next build"

[build.environment]
  NEXT_DISABLE_PINNED_VERSION = "1"
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_CLINIC_PHONE,NEXT_PUBLIC_CLINIC_EMAIL,NEXT_PUBLIC_EMERGENCY_PHONE,NEXT_PUBLIC_SITE_NAME"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
